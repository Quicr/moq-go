<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <defs>
    <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8"/>
      <stop offset="100%" style="stop-color:#007D9C"/>
    </linearGradient>
  </defs>

  <!-- M letter -->
  <text x="10" y="72" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#goGrad)">M</text>

  <!-- o as gopher face circle -->
  <circle cx="120" cy="50" r="32" fill="url(#goGrad)"/>

  <!-- Gopher ears -->
  <ellipse cx="98" cy="28" rx="8" ry="10" fill="url(#goGrad)"/>
  <ellipse cx="142" cy="28" rx="8" ry="10" fill="url(#goGrad)"/>

  <!-- Gopher eyes -->
  <circle cx="108" cy="42" r="9" fill="white"/>
  <circle cx="132" cy="42" r="9" fill="white"/>
  <circle cx="110" cy="42" r="4.5" fill="#1a1a2e"/>
  <circle cx="134" cy="42" r="4.5" fill="#1a1a2e"/>

  <!-- Gopher nose -->
  <ellipse cx="120" cy="58" rx="6" ry="4" fill="#CE9178"/>

  <!-- Gopher teeth -->
  <rect x="116" y="64" width="8" height="6" rx="1" fill="white"/>

  <!-- Q letter -->
  <text x="165" y="72" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#goGrad)">Q</text>
</svg>
